<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Overtime Pay Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h2>Overtime Calculator</h2>

  <label>Hourly Rate ($)</label>
  <input type="number" id="hourlyRate" placeholder="e.g. 20">

  <label>Overtime Multiplier</label>
  <input type="number" id="multiplier" value="1.5" step="0.1">

  <label>Overtime Hours Worked</label>
  <input type="number" id="overtimeHours" placeholder="e.g. 10">

  <button onclick="calculateOvertime()">Calculate</button>

  <div class="result" id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
